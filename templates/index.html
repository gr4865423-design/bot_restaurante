<!DOCTYPE html>
<html>
<head>
    <title>Chat Bot</title>
    <style>
        body {
            font-family: Arial;
            background: #ece5dd;
        }

        #chat {
            width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .msg {
            margin: 5px 0;
            padding: 8px;
            border-radius: 8px;
            max-width: 70%;
        }

        .user {
            background: #dcf8c6;
            align-self: flex-end;
        }

        .bot {
            background: #f1f0f0;
            align-self: flex-start;
        }

        #inputArea {
            display: flex;
            border-top: 1px solid #ccc;
        }

        #input {
            flex: 1;
            padding: 10px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            background: green;
            color: white;
        }
    </style>
</head>

<body>

<div id="chat">
    <div id="messages"></div>

    <div id="inputArea">
        <input type="text" id="input" placeholder="Digite sua mensagem..." />
        <button onclick="enviar()">Enviar</button>
    </div>
</div>

<script>
    async function enviar() {
        let input = document.getElementById("input");
        let msg = input.value;

        if (!msg) return;

        adicionarMensagem(msg, "user");

        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ mensagem: msg })
        });

        let data = await res.json();

        adicionarMensagem(data.resposta, "bot");

        input.value = "";
    }

    function adicionarMensagem(texto, classe) {
        let div = document.createElement("div");
        div.className = "msg " + classe;
        div.innerText = texto;

        document.getElementById("messages").appendChild(div);
    }
</script>

</body>
</html>
